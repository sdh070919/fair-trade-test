<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
공정무역 소비 유형 테스트
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700&family=Noto+Color+Emoji&display=swap"
rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{

margin:0;

padding:20px;

font-family:
"Noto Color Emoji",
"Pretendard",
sans-serif;

background:

linear-gradient(
135deg,
#edf7ff,
#f4fff3
);

min-height:100vh;

color:#1f2937;

}

.container{

max-width:760px;

margin:auto;

background:
rgba(255,255,255,.92);

backdrop-filter:blur(10px);

padding:35px;

border-radius:32px;

box-shadow:
0 12px 40px rgba(0,0,0,.08);

animation:fade .7s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:none;
}

}

.top{

width:max-content;

margin:auto;

padding:10px 18px;

border-radius:999px;

background:white;

font-size:14px;

font-weight:700;

margin-bottom:24px;

}

h1{

text-align:center;

font-size:2.3rem;

margin-bottom:8px;

}

.desc{

text-align:center;

line-height:1.8;

color:#6b7280;

margin-bottom:35px;

}

.progressWrap{

height:14px;

background:#e5e7eb;

border-radius:999px;

overflow:hidden;

margin-bottom:35px;

}

.progress{

height:100%;

width:0;

background:

linear-gradient(
90deg,
#78b6ff,
#6ee7a7
);

transition:.4s;

}

.questionCard{

animation:card .4s;

}

@keyframes card{

from{

opacity:0;

transform:
translateY(10px);

}

to{

opacity:1;

transform:none;

}

}

.number{

font-size:13px;

font-weight:700;

color:#6b7280;

margin-bottom:15px;

}

.question{

font-size:1.4rem;

line-height:1.7;

margin-bottom:28px;

}

.option{

width:100%;

padding:22px;

border:none;

border-radius:24px;

margin-bottom:15px;

background:#f4f8ff;

cursor:pointer;

font-size:15px;

transition:.25s;

}

.option:hover{

transform:
translateY(-4px)
scale(1.02);

background:#ddeeff;

box-shadow:
0 10px 22px rgba(79,124,255,.15);

}

#result{

display:none;

}

.resultCard{

padding:40px;

border-radius:32px;

color:white;

position:relative;

overflow:hidden;

animation:pop .5s;

}

@keyframes pop{

from{

opacity:0;

transform:scale(.95);

}

to{

opacity:1;

transform:none;

}

}

.bgEmoji{

position:absolute;

font-size:220px;

opacity:.12;

right:-20px;

top:-20px;

}

.emoji{

font-size:72px;

margin-bottom:15px;

}

.code{

letter-spacing:5px;

font-weight:700;

}

.title{

font-size:2.2rem;

margin-top:12px;

}

.resultDesc{

line-height:1.9;

margin-top:20px;

}

.tags{

margin-top:24px;

}

.tag{

display:inline-block;

padding:10px 14px;

border-radius:999px;

background:
rgba(255,255,255,.18);

margin:6px;

}

.kakao{

margin-top:28px;

background:white;

padding:22px;

border-radius:24px;

color:black;

}

.profile{

width:52px;

height:52px;

border-radius:50%;

display:flex;

align-items:center;

justify-content:center;

font-size:24px;

background:
linear-gradient(
135deg,
#8dc7ff,
#92f0c0
);

}

.btnWrap{

display:flex;

gap:12px;

margin-top:28px;

}

.btn{

flex:1;

padding:16px;

border:none;

border-radius:18px;

cursor:pointer;

font-weight:700;

}

.restart{

background:#4f7cff;

color:white;

}

.share{

background:#111827;

color:white;

}

.footer{

text-align:center;

margin-top:28px;

color:#9ca3af;

}

</style>

</head>

<body>

<div class="container">

<div class="top">

🌍 FAIR TRADE TEST

</div>

<h1>

공정무역 소비 유형 테스트

</h1>

<div class="desc">

당신의 소비 습관은
세상을 어떻게 바꾸고 있을까요?

</div>

<div class="progressWrap">

<div
class="progress"
id="progress">

</div>

</div>

<div id="quiz"></div>

<div id="result">

<div
class="resultCard"
id="resultCard">

<div
class="bgEmoji"
id="bg">

🌱

</div>

<div
class="emoji"
id="emoji">

🌱

</div>

<div
class="code"
id="code">

PLIA

</div>

<div
class="title"
id="title">

윤리적 분석가

</div>

<div
class="resultDesc"
id="rdesc">

</div>

<div
class="tags"
id="tags">

</div>

</div>

<div class="kakao">

<div style="
display:flex;
gap:12px;
align-items:center;
">

<div
class="profile"
id="profile">

🌍

</div>

<div>

<b>
공정무역 테스트
</b>

<br>

친구와 공유하기

</div>

</div>

<div
style="
margin-top:18px;
background:#f3f4f6;
padding:18px;
border-radius:18px;
"

id="sharePreview">

</div>

</div>

<div class="btnWrap">

<button
class="btn restart"
onclick="
location.reload()
">

다시하기

</button>

<button
class="btn share"
onclick="
shareResult()
">

공유하기

</button>

</div>

</div>

<div class="footer">

📲 Instagram Follow @FairTrade

</div>

</div>

<script>

const questions=[

["공정무역 커피와 유기농 커피 중 하나만 살 수 있다면?",
"P",
"E",
"생산자에게 정당한 임금이 가는 공정무역 커피",
"농약 없이 친환경 재배 유기농 커피"],

["공정무역 브랜드를 고를 때 나는?",
"P",
"E",
"노동자 처우 확인",
"친환경 포장 확인"],

["공정무역이 필요한 이유?",
"P",
"E",
"노동 착취 방지",
"지속가능성"],

["공정무역 캠페인 메시지?",
"P",
"E",
"생산자에게 정당한 값",
"지구를 생각하는 소비"],

["공정무역 인증 제품을 보면?",
"L",
"F",
"인증 기준 조사",
"좋은 일 같아 끌림"],

["친구에게 설명할 때?",
"L",
"F",
"데이터 중심 설명",
"농부 이야기 설명"],

["콘텐츠에서 더 끌리는 것은?",
"L",
"F",
"통계 그래프",
"인터뷰 영상"],

["효과가 의심될 때?",
"L",
"F",
"보고서 검증",
"사례 확인"],

["학교 앞 편의점에 제품이 없다면?",
"I",
"S",
"혼자 구매처 탐색",
"학교에 건의"],

["캠페인 참여 요청?",
"I",
"S",
"효과 검토",
"바로 참여"],

["공정무역 원두 안 쓰는 카페?",
"I",
"S",
"조용히 이동",
"도입 건의"],

["학교 인증 추진?",
"I",
"S",
"기준 조사",
"서명 운동"],

["공정무역 초콜릿이 더 비싸면?",
"A",
"C",
"가치 소비",
"가격 고민"],

["브랜드 논란 발생?",
"A",
"C",
"바로 변경",
"확인 후 결정"],

["공정무역 음료 발견?",
"A",
"C",
"바로 구매",
"가격 보고"],

["친구 조언?",
"A",
"C",
"일단 시작",
"조사 후 시작"]

];

const resultMap={

PLIA:["🌱","윤리적 분석가"],
PLIC:["🔍","신중한 인권 탐구자"],
PLSA:["📣","데이터 기반 활동가"],
PLSC:["📊","전략적 사회 분석가"],

PFIA:["🤝","공감형 실천가"],
PFIC:["💭","따뜻한 관찰자"],
PFSA:["🌍","열정적 활동가"],
PFSC:["🫂","감성 세계시민"],

ELIA:["🌿","환경 분석 실천가"],
ELIC:["🧪","꼼꼼한 환경 탐색가"],
ELSA:["📈","환경 데이터 행동가"],
ELSC:["🔬","냉철한 환경 전략가"],

EFIA:["☘️","감성 환경 실천가"],
EFIC:["🌸","조용한 환경 공감자"],
EFSA:["🌎","지속가능 행동가"],
EFSC:["🌊","감성 지구 시민"]

};

let idx=0;

let score={
P:0,E:0,
L:0,F:0,
I:0,S:0,
A:0,C:0
};

function draw(){

document.getElementById(
"progress"
).style.width=
(idx/16*100)+"%";

if(idx>=16){

showResult();

return;

}

const q=questions[idx];

quiz.innerHTML=`

<div class="questionCard">

<div class="number">

QUESTION ${idx+1}/16

</div>

<div class="question">

${q[0]}

</div>

<button
class="option"
onclick="pick('${q[1]}')">

${q[3]}

</button>

<button
class="option"
onclick="pick('${q[2]}')">

${q[4]}

</button>

</div>

`;

}

function pick(t){

score[t]++;

idx++;

draw();

}

function showResult(){

quiz.style.display="none";

result.style.display="block";

const code=

(score.P>=score.E?"P":"E")+

(score.L>=score.F?"L":"F")+

(score.I>=score.S?"I":"S")+

(score.A>=score.C?"A":"C");

const r=resultMap[code];

emoji.innerHTML=r[0];
bg.innerHTML=r[0];
profile.innerHTML=r[0];

title.innerHTML=r[1];

window.finalCode=code;

document.getElementById(
"code"
).innerHTML=code;

rdesc.innerHTML=

`
당신은 <b>${r[1]}</b> 유형입니다.

가치 소비를 통해
세상을 바꾸는 공정무역 시민입니다.

📲 인스타 공유해보세요!
`;

tags.innerHTML=

`
<span class=tag>#공정무역</span>

<span class=tag>#${code}</span>

<span class=tag>#가치소비</span>
`;

sharePreview.innerHTML=

`
${r[0]} ${r[1]}

유형 : ${code}

공정무역 소비 테스트 결과
`;

}

function shareResult(){

navigator.clipboard.writeText(

`🌍 공정무역 소비 유형 테스트

내 결과 :

${title.innerText}

(${finalCode})

너도 해보기!`

);

alert(
"복사 완료!"
);

}

draw();

</script>

</body>

</html>
