<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>공정무역 소비 유형 테스트</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:
"Segoe UI",
sans-serif;

background:
linear-gradient(
135deg,
#edf7ff,
#f4fff3
);

min-height:100vh;

padding:20px;

color:#1f2937;
}

.container{

max-width:850px;

margin:auto;

background:white;

padding:40px;

border-radius:35px;

box-shadow:
0 20px 50px rgba(0,0,0,.08);

}

.top{

width:max-content;

margin:auto;

padding:12px 18px;

background:#f3f4f6;

border-radius:999px;

font-weight:700;

margin-bottom:25px;

}

h1{

text-align:center;

font-size:2.5rem;

margin-bottom:10px;

}

.desc{

text-align:center;

color:#6b7280;

line-height:1.8;

margin-bottom:35px;

}

.progressWrap{

height:14px;

background:#e5e7eb;

border-radius:999px;

overflow:hidden;

margin-bottom:35px;

}

.progress{

height:100%;

width:0;

background:
linear-gradient(
90deg,
#73aaff,
#76e7a4
);

transition:.35s;

}

.questionCard{

animation:fade .35s;

}

@keyframes fade{

from{
opacity:0;
transform:translateY(10px);
}

to{
opacity:1;
transform:none;
}

}

.number{

font-size:13px;

font-weight:700;

color:#6b7280;

margin-bottom:15px;

}

.question{

font-size:1.45rem;

line-height:1.7;

margin-bottom:28px;

}

.option{

width:100%;

padding:22px;

border:none;

border-radius:24px;

margin-bottom:16px;

background:#f5f8ff;

cursor:pointer;

transition:.25s;

font-size:15px;

text-align:left;

}

.option:hover{

background:#ddeeff;

transform:
translateY(-4px);

}

#result{
display:none;
}

.resultCard{

padding:42px;

border-radius:32px;

color:white;

position:relative;

overflow:hidden;

}

.bigEmoji{

position:absolute;

right:-10px;

top:-20px;

font-size:220px;

opacity:.12;

}

.emoji{
font-size:78px;
margin-bottom:15px;
}

.code{

letter-spacing:5px;

font-weight:700;

margin-bottom:12px;

}

.title{

font-size:2.2rem;

font-weight:700;

margin-bottom:18px;

}

.resultDesc{

line-height:2;

font-size:15px;

}

.tags{

display:flex;

flex-wrap:wrap;

gap:10px;

margin-top:25px;

}

.tag{

padding:10px 15px;

border-radius:999px;

background:
rgba(255,255,255,.2);

}

.analysis{

margin-top:25px;

background:
rgba(255,255,255,.18);

padding:20px;

border-radius:20px;

}

.bar{

height:12px;

background:
rgba(255,255,255,.25);

border-radius:999px;

overflow:hidden;

margin-top:8px;

margin-bottom:15px;

}

.fill{

height:100%;

background:white;

}

.shareBox{

margin-top:30px;

background:white;

padding:24px;

border-radius:24px;

box-shadow:
0 8px 20px rgba(0,0,0,.06);

}

.preview{

background:#f3f4f6;

padding:18px;

border-radius:18px;

margin-top:18px;

line-height:1.8;

}

.btnWrap{

display:flex;

gap:12px;

margin-top:25px;

}

.btn{

flex:1;

padding:18px;

border:none;

border-radius:18px;

font-weight:700;

cursor:pointer;

}

.restart{

background:#4f7cff;

color:white;

}

.share{

background:#111827;

color:white;

}

.footer{

text-align:center;

margin-top:30px;

color:#6b7280;

line-height:1.8;

}

</style>
</head>

<body>

<div class="container">

<div class="top">
🌍 FAIR TRADE TEST
</div>

<h1>
공정무역 소비 유형 테스트
</h1>

<div class="desc">
당신의 소비 습관은 세상을 어떻게 바꾸고 있을까요?
</div>

<div class="progressWrap">
<div
class="progress"
id="progress"></div>
</div>

<div id="quiz"></div>

<div id="result">

<div
class="resultCard"
id="resultCard">

<div
class="bigEmoji"
id="bg"></div>

<div
class="emoji"
id="emoji"></div>

<div
class="code"
id="code"></div>

<div
class="title"
id="title"></div>

<div
class="resultDesc"
id="rdesc"></div>

<div
class="tags"
id="tags"></div>

<div class="analysis">

축 분석

<div>
People / Environment
<div class="bar">
<div
class="fill"
id="pe"></div>
</div>
</div>

<div>
Logic / Feeling
<div class="bar">
<div
class="fill"
id="lf"></div>
</div>
</div>

<div>
Insight / Social
<div class="bar">
<div
class="fill"
id="is"></div>
</div>
</div>

<div>
Action / Caution
<div class="bar">
<div
class="fill"
id="ac"></div>
</div>
</div>

</div>

</div>

<div class="shareBox">

<b>친구와 공유하기</b>

<div
class="preview"
id="preview"></div>

</div>

<div class="btnWrap">

<button
class="btn restart"
onclick="location.reload()">

다시하기

</button>

<button
class="btn share"
onclick="shareResult()">

공유하기

</button>

</div>

</div>

<div class="footer">

📲 Instagram @FairTrade

</div>

</div>

<script>

const questions=[

["공정무역 커피와 유기농 커피 중 하나만 살 수 있다면?","P","E","공정무역 커피","유기농 커피"],

["공정무역 브랜드를 고를 때 나는?","P","E","노동자 처우 확인","친환경 확인"],

["공정무역이 필요한 이유?","P","E","노동 착취 방지","지속가능성"],

["공감 메시지?","P","E","생산자의 정당한 값","지구를 위한 소비"],

["인증 마크를 보면?","L","F","인증 조사","좋은 일 같음"],

["친구 설명?","L","F","데이터 설명","농부 이야기"],

["콘텐츠 선호?","L","F","통계 그래프","인터뷰"],

["효과 의심?","L","F","보고서 확인","사례 확인"],

["제품 없으면?","I","S","혼자 탐색","건의"],

["캠페인 요청?","I","S","검토 후","바로 참여"],

["카페 원두 문제?","I","S","조용히 이동","도입 제안"],

["학교 인증?","I","S","기준 조사","서명 운동"],

["초콜릿 비싸면?","A","C","구매","고민"],

["브랜드 논란?","A","C","바로 변경","확인"],

["음료 발견?","A","C","바로 구매","가격"],

["친구 조언?","A","C","일단 시작","조사 후"]

];

const resultMap={

PLIA:["🌱","윤리적 분석가"],
PLIC:["🔍","신중한 인권 탐구자"],
PLSA:["📣","데이터 기반 활동가"],
PLSC:["📊","전략적 사회 분석가"],

PFIA:["🤝","공감형 실천가"],
PFIC:["💭","따뜻한 관찰자"],
PFSA:["🌍","열정적 활동가"],
PFSC:["🫂","감성 세계시민"],

ELIA:["🌿","환경 분석 실천가"],
ELIC:["🧪","꼼꼼한 환경 탐색가"],
ELSA:["📈","환경 데이터 행동가"],
ELSC:["🔬","냉철한 환경 전략가"],

EFIA:["☘️","감성 환경 실천가"],
EFIC:["🌸","조용한 환경 공감자"],
EFSA:["🌎","지속가능 행동가"],
EFSC:["🌊","감성 지구 시민"]

};

let idx=0;

let score={
P:0,E:0,
L:0,F:0,
I:0,S:0,
A:0,C:0
};

function draw(){

progress.style.width=
(idx/16*100)+"%";

if(idx>=16){
showResult();
return;
}

let q=questions[idx];

quiz.innerHTML=`

<div class="questionCard">

<div class="number">
QUESTION ${idx+1}/16
</div>

<div class="question">
${q[0]}
</div>

<button
class="option"
onclick="pick('${q[1]}')">

${q[3]}

</button>

<button
class="option"
onclick="pick('${q[2]}')">

${q[4]}

</button>

</div>
`;

}

function pick(v){

score[v]++;

idx++;

draw();

}

function showResult(){

quiz.style.display="none";

result.style.display="block";

let code=

(score.P>=score.E?"P":"E")+

(score.L>=score.F?"L":"F")+

(score.I>=score.S?"I":"S")+

(score.A>=score.C?"A":"C");

let r=resultMap[code];

emoji.textContent=r[0];
bg.textContent=r[0];

document.getElementById("code").textContent=code;

title.textContent=r[1];

rdesc.innerHTML=
`
당신은 ${r[1]} 유형입니다.

공정무역 가치 소비를 통해
사회와 환경 변화를 추구합니다.
`;

tags.innerHTML=
`
<div class="tag">#공정무역</div>
<div class="tag">#${code}</div>
<div class="tag">#가치소비</div>
`;

pe.style.width=(score.P/4*100)+"%";
lf.style.width=(score.L/4*100)+"%";
is.style.width=(score.I/4*100)+"%";
ac.style.width=(score.A/4*100)+"%";

preview.innerHTML=
`${r[0]} ${r[1]}<br>
유형 : ${code}`;

resultCard.style.background=
"linear-gradient(135deg,#5f8eff,#73dfaa)";

window.finalCode=code;

}

function shareResult(){

navigator.clipboard.writeText(

`${title.textContent}

(${finalCode})`

);

alert("복사 완료");

}

draw();

</script>

</body>
</html>
