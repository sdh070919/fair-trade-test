<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1.0">

<title>
공정무역 소비 유형 테스트
</title>

<link rel="preconnect"
href="https://fonts.googleapis.com">

<link rel="preconnect"
href="https://fonts.gstatic.com"
crossorigin>

<link href="
https://fonts.googleapis.com/css2?
family=Pretendard:wght@400;500;600;700&
display=swap"
rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:
"Pretendard",
sans-serif;

background:

linear-gradient(
135deg,
#edf7ff 0%,
#f6fff3 100%
);

min-height:100vh;

padding:20px;

color:#1f2937;

}

.container{

max-width:820px;

margin:auto;

background:
rgba(255,255,255,.92);

backdrop-filter:
blur(14px);

padding:42px;

border-radius:34px;

box-shadow:
0 14px 40px
rgba(0,0,0,.08);

}

.top{

width:max-content;

margin:auto;

padding:
10px 18px;

border-radius:999px;

background:white;

font-size:14px;

font-weight:700;

margin-bottom:26px;

box-shadow:
0 4px 12px
rgba(0,0,0,.05);

}

h1{

text-align:center;

font-size:2.5rem;

margin-bottom:12px;

}

.desc{

text-align:center;

line-height:1.8;

color:#6b7280;

margin-bottom:36px;

}

.progressWrap{

height:14px;

background:#e5e7eb;

border-radius:999px;

overflow:hidden;

margin-bottom:38px;

}

.progress{

height:100%;

width:0;

transition:.4s;

background:

linear-gradient(
90deg,
#7ab7ff,
#79e5a9
);

}

.card{

animation:fade .4s;

}

@keyframes fade{

from{
opacity:0;
transform:
translateY(10px);
}

to{
opacity:1;
transform:none;
}

}

.number{

font-size:13px;

font-weight:700;

color:#6b7280;

margin-bottom:16px;

}

.question{

font-size:1.42rem;

line-height:1.8;

margin-bottom:30px;

font-weight:600;

}

.option{

width:100%;

padding:22px;

border:none;

border-radius:24px;

background:#f4f8ff;

margin-bottom:16px;

cursor:pointer;

font-size:15px;

text-align:left;

transition:.25s;

}

.option:hover{

background:#dfeeff;

transform:
translateY(-4px);

box-shadow:
0 12px 24px
rgba(79,124,255,.12);

}

#result{

display:none;

}

.resultCard{

padding:42px;

border-radius:32px;

position:relative;

overflow:hidden;

color:white;

}

.bgEmoji{

position:absolute;

right:-30px;

top:-40px;

font-size:220px;

opacity:.08;

}

.emoji{

font-size:72px;

margin-bottom:18px;

}

.code{

letter-spacing:5px;

font-weight:700;

opacity:.9;

}

.title{

font-size:2.2rem;

margin-top:10px;

}

.resultDesc{

line-height:2;

margin-top:22px;

}

.tags{

margin-top:24px;

display:flex;

gap:10px;

flex-wrap:wrap;

}

.tag{

padding:
10px 16px;

border-radius:999px;

background:
rgba(255,255,255,.18);

}

.kakao{

margin-top:28px;

padding:24px;

background:white;

border-radius:24px;

color:black;

box-shadow:
0 8px 20px
rgba(0,0,0,.05);

}

.profile{

width:56px;
height:56px;

border-radius:50%;

display:flex;

align-items:center;
justify-content:center;

font-size:28px;

background:
linear-gradient(
135deg,
#8dc7ff,
#9df0c0
);

}

.btnWrap{

display:flex;

gap:12px;

margin-top:28px;

}

.btn{

flex:1;

padding:18px;

border:none;

border-radius:18px;

font-weight:700;

cursor:pointer;

}

.restart{

background:#5678ff;
color:white;

}

.share{

background:#0f172a;
color:white;

}

.footer{

margin-top:30px;

text-align:center;

color:#9ca3af;

}

</style>

</head>

<body>

<div class="container">

<div class="top">
🌍 FAIR TRADE TEST
</div>

<h1>
공정무역 소비 유형 테스트
</h1>

<div class="desc">

당신의 소비 습관은
세상을 어떻게 바꾸고 있을까요?

</div>

<div class="progressWrap">

<div
class="progress"
id="progress">
</div>

</div>

<div id="quiz"></div>

<div id="result">

<div
class="resultCard"
id="resultCard">

<div
class="bgEmoji"
id="bgEmoji">
🌱
</div>

<div
class="emoji"
id="emoji">
🌱
</div>

<div
class="code"
id="code">
PLIA
</div>

<div
class="title"
id="title">
윤리적 분석가
</div>

<div
class="resultDesc"
id="rdesc">
</div>

<div
class="tags"
id="tags">
</div>

</div>

<div class="kakao">

<div style="
display:flex;
gap:14px;
align-items:center;
">

<div
class="profile"
id="profile">
🌱
</div>

<div>

<b>
공정무역 테스트
</b>

<br>

친구와 공유하기

</div>

</div>

<div
style="
margin-top:18px;
background:#f3f4f6;
padding:18px;
border-radius:18px;
"
id="sharePreview">

</div>

</div>

<div class="btnWrap">

<button
class="btn restart"
onclick="
location.reload()
">

다시하기

</button>

<button
class="btn share"
onclick="
shareResult()
">

공유하기

</button>

</div>

</div>

<div class="footer">

📲 Instagram Follow
@FairTrade

</div>

</div>

<script>

const questions=[

[
"Q1. 공정무역 커피와 유기농 커피 중 단 하나만 선택해야 한다면 어떤 기준으로 고르시겠습니까?",
"P","E",
"생산자에게 정당한 임금이 지급되는 공정무역 커피를 선택한다",
"친환경 방식으로 재배된 유기농 커피를 선택한다"
],

[
"Q2. 공정무역 브랜드를 고를 때 가장 먼저 확인하는 것은 무엇입니까?",
"P","E",
"노동자 처우와 공정한 임금 구조",
"친환경 포장재와 탄소배출량"
],

[
"Q3. 공정무역이 필요한 가장 큰 이유는 무엇이라고 생각합니까?",
"P","E",
"노동 착취와 불공정 구조 개선",
"지속가능한 환경 보전"
],

[
"Q4. 공정무역 캠페인에서 가장 공감되는 메시지는 무엇입니까?",
"P","E",
"생산자의 땀에 정당한 값을 지불하세요",
"지구를 생각하는 소비를 시작하세요"
],

[
"Q5. 공정무역 인증 제품을 처음 봤을 때 당신은 어떻게 행동합니까?",
"L","F",
"인증 기준과 신뢰성을 조사한다",
"좋은 일을 하는 소비처럼 느껴진다"
],

[
"Q6. 친구에게 공정무역을 설명한다면 어떻게 설명합니까?",
"L","F",
"공급망·가격 구조·데이터 중심",
"생산자의 삶과 이야기 중심"
],

[
"Q7. 공정무역 콘텐츠에서 더 관심 가는 것은 무엇입니까?",
"L","F",
"통계 그래프",
"인터뷰 영상"
],

[
"Q8. 공정무역 효과가 의심될 때 어떻게 확인합니까?",
"L","F",
"논문·보고서 검증",
"실제 사례 확인"
],

[
"Q9. 학교 앞 편의점에 공정무역 제품이 없다면?",
"I","S",
"혼자 구매처를 찾는다",
"학교에 건의한다"
],

[
"Q10. 공정무역 캠페인 참여 요청을 받는다면?",
"I","S",
"효과를 검토 후 결정",
"바로 참여"
],

[
"Q11. 좋아하는 카페가 공정무역 원두를 사용하지 않는다면?",
"I","S",
"조용히 다른 카페 이용",
"도입 건의"
],

[
"Q12. 학교 공정무역 인증 추진 시?",
"I","S",
"기준 조사",
"서명 운동"
],

[
"Q13. 공정무역 초콜릿이 2000원 비싸다면?",
"A","C",
"가치 소비",
"가격 고민"
],

[
"Q14. 브랜드가 불공정무역 논란이면?",
"A","C",
"즉시 변경",
"확인 후 결정"
],

[
"Q15. 편의점 공정무역 음료를 보면?",
"A","C",
"바로 구매",
"가격 보고 판단"
],

[
"Q16. 친구에게 공정무역 소비를 추천한다면?",
"A","C",
"일단 시작",
"조사 후 시작"
]

];

const resultMap={

PLIA:["🌱","윤리적 분석가"],
PLIC:["🔍","신중한 인권 탐구자"],
PLSA:["📣","데이터 기반 활동가"],
PLSC:["📊","전략적 사회 분석가"],

PFIA:["🤝","공감형 실천가"],
PFIC:["💭","따뜻한 관찰자"],
PFSA:["🌍","열정적 활동가"],
PFSC:["🫂","감성 세계시민"],

ELIA:["🌿","환경 분석 실천가"],
ELIC:["🧪","꼼꼼한 환경 탐색가"],
ELSA:["📈","환경 데이터 행동가"],
ELSC:["🔬","냉철한 환경 전략가"],

EFIA:["☘️","감성 환경 실천가"],
EFIC:["🌸","조용한 환경 공감자"],
EFSA:["🌎","지속가능 행동가"],
EFSC:["🌊","감성 지구 시민"]

};

let idx=0;

let score={
P:0,E:0,
L:0,F:0,
I:0,S:0,
A:0,C:0
};

function draw(){

progress.style.width=
(idx/16*100)+"%";

if(idx>=16){

showResult();
return;

}

let q=questions[idx];

quiz.innerHTML=`

<div class="card">

<div class="number">

QUESTION ${idx+1}/16

</div>

<div class="question">

${q[0]}

</div>

<button
class="option"
onclick="pick('${q[1]}')">

${q[3]}

</button>

<button
class="option"
onclick="pick('${q[2]}')">

${q[4]}

</button>

</div>

`;

}

function pick(t){

score[t]++;

idx++;

draw();

}

function showResult(){

quiz.style.display="none";

result.style.display="block";

const code=

(score.P>=score.E?"P":"E")+

(score.L>=score.F?"L":"F")+

(score.I>=score.S?"I":"S")+

(score.A>=score.C?"A":"C");

const r=resultMap[code];

emoji.innerText=r[0];
bgEmoji.innerText=r[0];
profile.innerText=r[0];

window.finalCode=code;

document.getElementById(
"code"
).innerText=code;

title.innerText=r[1];

rdesc.innerHTML=

`
당신은
<b>${r[1]}</b>
유형입니다.

공정무역 소비를 통해
사회와 환경의 변화를
만드는 시민입니다.

📲 인스타 공유해보세요!
`;

tags.innerHTML=

`
<span class="tag">
#공정무역
</span>

<span class="tag">
#${code}
</span>

<span class="tag">
#가치소비
</span>
`;

sharePreview.innerHTML=

`
${r[0]} ${r[1]}

<br><br>

유형 :
${code}

<br><br>

공정무역 소비 테스트 결과
`;

resultCard.style.background=

"linear-gradient(135deg,#6ea8ff,#79e3aa)";

}

function shareResult(){

navigator.clipboard.writeText(

`🌍 공정무역 소비 유형 테스트

내 결과 :

${title.innerText}

(${finalCode})

너도 해보기!`

);

alert("복사 완료");

}

draw();

</script>

</body>
</html>
